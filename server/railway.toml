# server/railway.toml
# Railway reads this file to know how to build and start your server.
# No changes needed — it will auto-detect Node and run "npm start".

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
